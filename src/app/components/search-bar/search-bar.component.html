<div class="filtros-container">
  <div class="tipo">
    <label for="tipo">Tipo de vehículo:</label>
    <div class="select-container">

      <select id="tipo" class="custom-select">
        <option value="todos">Todos</option>
        <option value="auto">Autos</option>
        <option value="camioneta">Camionetas</option>
        <option value="moto">Motos</option>
      </select>
    </div>
  </div>
  <div class="marca">

    <label for="marca">Marca:</label>
    <div class="select-container">

      <select id="marca" class="custom-select">
        <option value="todos">Todas</option>
        <option value="toyota">Toyota</option>
        <option value="ford">Ford</option>
        <option value="chevrolet">Chevrolet</option>
      </select>
    </div>
  </div>
 <div class="input-group">
  <label for="precio">Precio Máximo</label>
  <input type="number" id="precio" placeholder="Ej: 50000000">
</div>

<div class="input-group">
  <label for="anio">Año</label>
  <input type="number" id="anio" placeholder="Ej: 2022">
</div>
<button class="buscar-btn">Buscar</button>
</div>
